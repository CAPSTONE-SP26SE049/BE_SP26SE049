spring:
  application:
    name: com.company.FSA_Captone_2026

  # JPA/Database Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop  # Initial setup: CREATE schema from scratch
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC

  # Spring Data JPA
  data:
    jpa:
      repositories:
        bootstrap-mode: default

  datasource:
    url: jdbc:postgresql://localhost:5432/speakvn_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null

  # Servlet Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

# JWT Configuration
jwt:
  secret: your-super-secret-key-change-this-in-production-environment-minimum-256-bits
  expiration: 86400000

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: Authorization,Content-Type,Accept,X-Requested-With
  max-age: 3600
  allow-credentials: true

# Application API Configuration
app:
  api:
    title: FSA Capstone 2026 API
    description: API for FSA Capstone Project 2026
    version: 1.0.0
  contact:
    name: FSA Team
    email: contact@fsa.com

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

# Logging Configuration
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.security: DEBUG
    org.fsa_2026: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

