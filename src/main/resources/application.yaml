spring:
  application:
    name: com.company.FSA_Captone_2026

  # JPA/Database Configuration
  jpa:
    hibernate:
      ddl-auto: validate  # Ensuring schema matches Entities
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC  # ISO 8601 compliance

  # Spring Data JPA
  data:
    jpa:
      repositories:
        bootstrap-mode: default

  datasource:
    url: jdbc:postgresql://${PGHOST:speak-journeyvn123.postgres.database.azure.com}:${PGPORT:5432}/${PGDATABASE:postgres}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:Pen1112003@}
    driver-class-name: org.postgresql.Driver

  # Liquibase Configuration
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null

  # Servlet Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Mail Configuration (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:nguyenductuan11012003@gmail.com}
    password: ${MAIL_PASSWORD:mpeyxysuqkrnwoqx}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
    test-connection: false  # Don't test SMTP on startup (avoid blocking)

# Mail App Configuration
mail:
  from: ${MAIL_FROM:nguyenductuan11012003@gmail.com}
  base-url: ${MAIL_BASE_URL:http://localhost:5173}

server:
  port: ${SERVER_PORT:8082}  # Use environment variable or default 8082
  # If port is in use, can also use: port: 0 (auto-assign available port)
  shutdown: graceful  # Graceful shutdown on SIGTERM

# JWT Configuration
jwt:
  secret: F4/Bv1CjoyB+R3EhxoD4GaGmKzfskIKsyog/ABCL04xKSut2anfVIzvneaT2ZVReoQA5nX9oK8TS782AAOLrmg==
  access-token-expiration: 3600000      # 1 hour in milliseconds
  refresh-token-expiration: 604800000   # 7 days in milliseconds

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: Authorization,Content-Type,Accept,X-Requested-With
  max-age: 3600
  allow-credentials: true

# Application API Configuration
app:
  api:
    title: FSA Capstone 2026 API
    description: API for FSA Capstone Project 2026
    version: 1.0.0
  contact:
    name: FSA Team
    email: contact@fsa.com

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

# Logging Configuration
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.security: DEBUG
    org.fsa_2026: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
